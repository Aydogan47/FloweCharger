name: Android APK Build and Release\non:  \n  push:\n    tags:\n      - 'v*'  # Trigger on version tags\n\njobs:\n  build:\n    runs-on: ubuntu-latest\n\n    steps:\n      - name: Checkout code\n        uses: actions/checkout@v2\n\n      - name: Set up JDK\n        uses: actions/setup-java@v2\n        with:\n          java-version: '11'  # Specify JDK version\n\n      - name: Build APK\n        run: ./gradlew assembleRelease  # Adjust according to your build system\n\n      - name: Create Release\n        id: create_release\n        uses: softprops/action-gh-release@v1\n        with:\n          tag_name: ${{ github.ref }}\n          release_name: Release ${{ github.ref }}\n          body: |\n            This release includes the latest APK build.\n        env:\n          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}\n\n      - name: Upload APK asset\n        uses: softprops/action-gh-release@v1\n        with:\n          upload_asset: app/build/outputs/apk/release/app-release.apk  # Adjust the path according to your build output\n        env:\n          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}